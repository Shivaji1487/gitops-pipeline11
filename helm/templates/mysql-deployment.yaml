apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-db
  namespace: bank-production-v11
spec:
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "admin123"
        - name: MYSQL_DATABASE
          value: "abc_bank"
        ports:
        - containerPort: 3306
        resources:           # <-- 1. ये नया ब्लॉक ऐड करें
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1"
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-storage
        emptyDir:
          medium: Memory     # <-- 2. यहाँ 'medium: Memory' लाइन ऐड करें