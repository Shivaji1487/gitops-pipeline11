apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pipeline11java-ingress
  namespace: bank-production-v11
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: pipeline11java.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pipeline11java-service
            port:
              number: 80